<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Maßnahmen-Auswertung{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .smiley-btn {
      transition: all 0.15s;
      font-size: 1.75rem;
      width: 3rem;
      height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      border: 2px solid transparent;
      background: #f3f4f6;
    }
    .smiley-btn:hover { background: #e5e7eb; transform: scale(1.05); }
    .smiley-btn.active-pos { background: #dcfce7; border-color: #16a34a; }
    .smiley-btn.active-neu { background: #fef3c7; border-color: #ca8a04; }
    .smiley-btn.active-neg { background: #fee2e2; border-color: #dc2626; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  {% if user %}
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-slate-900">
        <span class="text-2xl">🎓</span>
        <span>Maßnahmen-Auswertung</span>
      </a>
      <div class="flex items-center gap-3 text-sm">
        <a href="/massnahmen/neu" class="bg-slate-900 text-white px-3 py-1.5 rounded-md hover:bg-slate-700 transition whitespace-nowrap">+ Neue Maßnahme</a>
        <a href="/einstellungen" class="text-slate-500 hover:text-slate-900 transition hidden sm:inline" title="Einstellungen">⚙</a>
        <span class="text-slate-500 hidden md:inline">{{ user.name }}</span>
        <form method="post" action="/logout" class="inline">
          <button type="submit" class="text-slate-500 hover:text-slate-900 transition">Logout</button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm opacity-0 transition-opacity duration-300 z-50 pointer-events-none">
    <span id="toast-msg">Gespeichert</span>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const showToast = (msg) => {
        const el = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        el.style.opacity = '1';
        setTimeout(() => { el.style.opacity = '0'; }, 1800);
      };
      if (params.has('saved')) {
        showToast('✓ Gespeichert');
        params.delete('saved');
        const url = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        window.history.replaceState({}, '', url);
      }
      if (params.has('deleted')) {
        showToast('🗑 Maßnahme gelöscht');
        params.delete('deleted');
        const url = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        window.history.replaceState({}, '', url);
      }
    })();
  </script>
</body>
</html>
