<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Maßnahmen-Auswertung{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    [data-lucide] { display: inline-block; vertical-align: middle; }
    .smiley-btn {
      transition: all 0.15s;
      width: 3rem;
      height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      cursor: pointer;
      border: 2px solid transparent;
      background: #f3f4f6;
      color: #6b7280;
    }
    .smiley-btn svg { width: 1.6rem; height: 1.6rem; }
    .smiley-btn:hover { background: #e5e7eb; transform: scale(1.05); }
    .smiley-btn.active-pos { background: #dcfce7; border-color: #16a34a; color: #16a34a; }
    .smiley-btn.active-neu { background: #fef3c7; border-color: #ca8a04; color: #ca8a04; }
    .smiley-btn.active-neg { background: #fee2e2; border-color: #dc2626; color: #dc2626; }
    .icon-pos { color: #16a34a; }
    .icon-neu { color: #ca8a04; }
    .icon-neg { color: #dc2626; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
  {% if user %}
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-slate-900">
        <i data-lucide="graduation-cap" class="w-6 h-6 text-slate-700"></i>
        <span>Maßnahmen-Auswertung</span>
      </a>
      <div class="flex items-center gap-3 text-sm">
        <a href="/analyse" class="text-slate-700 hover:text-slate-900 transition hidden sm:inline-flex items-center gap-1 font-medium">
          <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Analyse
        </a>
        <a href="/bulk-kategorien" class="text-slate-700 hover:text-slate-900 transition hidden md:inline-flex items-center gap-1 font-medium" title="Kategorien massenhaft zuweisen">
          <i data-lucide="tags" class="w-4 h-4"></i> Kategorien
        </a>
        <a href="/massnahmen/neu" class="bg-slate-900 text-white px-3 py-1.5 rounded-md hover:bg-slate-700 transition whitespace-nowrap inline-flex items-center gap-1">
          <i data-lucide="plus" class="w-4 h-4"></i> Neue Maßnahme
        </a>
        <a href="/einstellungen" class="text-slate-500 hover:text-slate-900 transition hidden sm:inline" title="Einstellungen">
          <i data-lucide="settings" class="w-4 h-4"></i>
        </a>
        <span class="text-slate-500 hidden md:inline">{{ user.name }}</span>
        <form method="post" action="/logout" class="inline">
          <button type="submit" class="text-slate-500 hover:text-slate-900 transition">Logout</button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-4 py-2 rounded-lg shadow-lg text-sm opacity-0 transition-opacity duration-300 z-50 pointer-events-none flex items-center gap-2">
    <i id="toast-icon" data-lucide="check" class="w-4 h-4"></i>
    <span id="toast-msg">Gespeichert</span>
  </div>
  <script>
    // Initial Lucide-Render
    function renderIcons(root) {
      if (window.lucide && lucide.createIcons) {
        lucide.createIcons({ nameAttr: 'data-lucide', icons: lucide.icons, attrs: {}, root: root || document });
      }
    }
    document.addEventListener('DOMContentLoaded', () => renderIcons());

    // Nach jedem HTMX-Swap erneut Icons rendern
    document.addEventListener('htmx:afterSwap', e => renderIcons(e.target));

    // Toast-Feedback für stille HTMX-Saves (Smiley-Bewertung + Kategorie)
    document.body.addEventListener('htmx:afterRequest', function(evt) {
      const xhr = evt.detail && evt.detail.xhr;
      if (!xhr) return;
      const url = (evt.detail.requestConfig && evt.detail.requestConfig.path) || '';
      if (xhr.status >= 200 && xhr.status < 300) {
        if (/\/bewertung\//.test(url)) window.showToast('Bewertung gespeichert', 'check');
        else if (/\/kategorie\b/.test(url)) window.showToast('Kategorie gespeichert', 'check');
      } else if (xhr.status >= 400) {
        window.showToast('Speichern fehlgeschlagen', 'alert-triangle');
      }
    });

    window.showToast = function(msg, iconName) {
      const el = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-msg').textContent = msg;
      if (iconName) icon.setAttribute('data-lucide', iconName);
      icon.outerHTML = '<i id="toast-icon" data-lucide="' + (iconName || 'check') + '" class="w-4 h-4"></i>';
      renderIcons(el);
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 1800);
    };

    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.has('saved')) {
        setTimeout(() => window.showToast('Gespeichert', 'check'), 100);
        params.delete('saved');
        window.history.replaceState({}, '', window.location.pathname + (params.toString() ? '?' + params.toString() : ''));
      }
      if (params.has('deleted')) {
        setTimeout(() => window.showToast('Maßnahme gelöscht', 'trash-2'), 100);
        params.delete('deleted');
        window.history.replaceState({}, '', window.location.pathname + (params.toString() ? '?' + params.toString() : ''));
      }
    })();
  </script>
</body>
</html>
