{% extends "base.html" %}
{% block title %}Login · Maßnahmen-Auswertung{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🎓</div>
      <h1 class="text-xl font-semibold text-slate-900">Maßnahmen-Auswertung</h1>
      <p class="text-sm text-slate-500 mt-1">Berufs- und Studienorientierung</p>
    </div>
    {% if error %}
    <div class="bg-red-50 text-red-700 px-3 py-2 rounded-md text-sm mb-4">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Benutzername</label>
        <input type="text" name="email" required autofocus autocomplete="username"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Passwort</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none">
      </div>
      <button type="submit"
              class="w-full bg-slate-900 text-white py-2 rounded-md font-medium hover:bg-slate-700 transition">
        Anmelden
      </button>
    </form>
  </div>
</div>
{% endblock %}
