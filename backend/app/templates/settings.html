{% extends "base.html" %}
{% block title %}Einstellungen{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <a href="/" class="text-sm text-slate-500 hover:text-slate-900">← Übersicht</a>
    <h1 class="text-2xl font-semibold text-slate-900 mt-2">Einstellungen</h1>
  </div>

  {% if msg %}
  <div class="bg-green-50 text-green-700 px-3 py-2 rounded-md text-sm mb-4">✓ {{ msg }}</div>
  {% endif %}
  {% if err %}
  <div class="bg-red-50 text-red-700 px-3 py-2 rounded-md text-sm mb-4">{{ err }}</div>
  {% endif %}

  <section class="bg-white rounded-xl border border-slate-200 mb-4">
    <header class="px-5 py-3 border-b border-slate-200">
      <h2 class="font-semibold text-slate-900">Profil</h2>
    </header>
    <form method="post" action="/einstellungen/profil" class="p-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Benutzername</label>
        <input type="text" value="{{ user.email }}" disabled
               class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-md text-slate-500">
        <p class="text-xs text-slate-400 mt-1">Benutzername kann nicht geändert werden.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Anzeigename</label>
        <input type="text" name="name" required value="{{ user.name }}"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none">
      </div>
      <button type="submit" class="bg-slate-900 text-white px-4 py-1.5 rounded-md text-sm hover:bg-slate-700 transition">
        Speichern
      </button>
    </form>
  </section>

  <section class="bg-white rounded-xl border border-slate-200 mb-4">
    <header class="px-5 py-3 border-b border-slate-200">
      <h2 class="font-semibold text-slate-900">Passwort ändern</h2>
    </header>
    <form method="post" action="/einstellungen/passwort" class="p-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Aktuelles Passwort</label>
        <input type="password" name="aktuelles_passwort" required autocomplete="current-password"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Neues Passwort</label>
        <input type="password" name="neues_passwort" required minlength="8" autocomplete="new-password"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none">
        <p class="text-xs text-slate-400 mt-1">Mindestens 8 Zeichen.</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Neues Passwort bestätigen</label>
        <input type="password" name="neues_passwort_bestaetigen" required minlength="8" autocomplete="new-password"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-900 focus:border-slate-900 outline-none">
      </div>
      <button type="submit" class="bg-slate-900 text-white px-4 py-1.5 rounded-md text-sm hover:bg-slate-700 transition">
        Passwort ändern
      </button>
    </form>
  </section>
</div>
{% endblock %}
